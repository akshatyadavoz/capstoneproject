name: Deploy Capstone App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy project files to EC2
        run: |
         rsync -avz --delete \
          --exclude '.git' \
          --exclude '.github' \
          -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
          ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/capstone/app/

      - name: Deploy on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/${{ secrets.EC2_USER }}/capstone/app
            chmod +x deploy.sh verify.sh
            ./deploy.sh
            ./verify.sh
          EOF
